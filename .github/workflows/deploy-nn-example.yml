name: Deploy nn_example to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - nn_example/**
      - .github/workflows/deploy-nn-example.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact from nn_example
        uses: actions/upload-pages-artifact@v3
        with:
          path: nn_example

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4